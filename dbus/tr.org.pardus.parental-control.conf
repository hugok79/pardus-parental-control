<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/software/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root (PPCDaemon) can own the name -->
  <policy user="root">
    <allow own="tr.org.pardus.ParentalControl"/>
  </policy>

  <policy context="default">
    <!-- Deny direct messages from users... -->
    <deny send_destination="tr.org.pardus.ParentalControl"/>
    <!-- ...except GetExpiryInfo: PPCAgent asks it on session startup -->
    <allow send_destination="tr.org.pardus.ParentalControl"
           send_interface="tr.org.pardus.ParentalControl"
           send_member="GetExpiryInfo"/>
    <!-- All users (PPCAgent in each session) can receive the broadcast signals -->
    <allow receive_sender="tr.org.pardus.ParentalControl" receive_type="signal"/>
  </policy>
</busconfig>
